name: TrueShuffle
on:
  workflow_dispatch:
    inputs:
      ipa_url: https://litter.catbox.moe/lpq3abiihsqgvr2x.ipa
        description: 'Direct download URL for the Spotify IPA'
        required: true

jobs:
  inject:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install insert_dylib
        run: brew install insert_dylib

      - name: Download IPA
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o Spotify.ipa
          echo "IPA size: $(du -sh Spotify.ipa | cut -f1)"

      - name: Inject dylib
        run: |
          unzip -q Spotify.ipa -d SpotifyUnpacked

          mkdir -p SpotifyUnpacked/Payload/Spotify.app/Frameworks
          cp TrueShuffle.dylib SpotifyUnpacked/Payload/Spotify.app/Frameworks/

          insert_dylib \
            --strip-codesig \
            --inplace \
            @executable_path/Frameworks/TrueShuffle.dylib \
            SpotifyUnpacked/Payload/Spotify.app/Spotify

          cd SpotifyUnpacked && zip -qr ../Spotify+TrueShuffle.ipa Payload/
          cd ..
          echo "Done: $(du -sh Spotify+TrueShuffle.ipa | cut -f1)"

      - name: Upload patched IPA
        uses: actions/upload-artifact@v4
        with:
          name: Spotify+TrueShuffle
          path: Spotify+TrueShuffle.ipa
