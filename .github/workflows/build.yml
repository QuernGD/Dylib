name: Build TrueShuffle

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CC=$(xcrun --sdk iphoneos --find clang)

          $CC \
            -fobjc-arc \
            -dynamiclib \
            -isysroot $SDK \
            -arch arm64 \
            -arch arm64e \
            -miphoneos-version-min=15.0 \
            -framework Foundation \
            -framework UIKit \
            -install_name @rpath/TrueShuffle.dylib \
            -Os \
            -o TrueShuffle.dylib \
            .github/workflows/TrueShuffle.m

          echo "Built:"
          file TrueShuffle.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: TrueShuffle.dylib
          path: TrueShuffle.dylib
